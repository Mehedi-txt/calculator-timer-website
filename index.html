<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator + Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="script.js"></script>
  <div class="container">

    <!-- Calculator -->
    <div class="box">
      <h2>Calculator</h2>
      <input type="text" id="calcInput" class="display" readonly>

      <div class="buttons">
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('*')">×</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('-')">−</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="clearDisplay()" class="clear-btn">C</button>
      </div>
    </div>

    <!-- Timer -->
    <div class="box">
      <h2>Timer</h2>
      <input type="number" id="seconds" class="timer-input" placeholder="Enter seconds">
      <br>
      <button onclick="startTimer()">Start</button>
      <button onclick="resetTimer()">Reset</button>
      <div class="timer" id="timerDisplay">0</div>
    </div>

  </div>


</body>
</html>
